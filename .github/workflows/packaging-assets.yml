name: packaging-assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - packages/ucpae_core/**
      - apps/ucpae_windows/windows/worker/**
      - scripts/**
      - .github/workflows/packaging-assets.yml

jobs:
  windows-worker-artifact:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows worker
        working-directory: apps/ucpae_windows/windows/worker/Ucpae.AccessibilityWorker
        run: dotnet publish -c Release -o publish

      - name: Upload Windows worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: ucpae-windows-worker
          path: apps/ucpae_windows/windows/worker/Ucpae.AccessibilityWorker/publish

  shared-lua-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upload shared Lua rules
        uses: actions/upload-artifact@v4
        with:
          name: ucpae-shared-lua
          path: packages/ucpae_core/assets/lua
