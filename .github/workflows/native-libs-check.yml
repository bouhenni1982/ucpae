name: native-libs-check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - apps/ucpae_android/android/app/src/main/jniLibs/**
      - apps/ucpae_windows/windows/runner/third_party/lua/**
      - .github/workflows/native-libs-check.yml

jobs:
  verify-placeholders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify expected native library locations exist
        shell: bash
        run: |
          test -d apps/ucpae_android/android/app/src/main/jniLibs/arm64-v8a
          test -d apps/ucpae_android/android/app/src/main/jniLibs/armeabi-v7a
          test -d apps/ucpae_android/android/app/src/main/jniLibs/x86_64
          test -d apps/ucpae_windows/windows/runner/third_party/lua
